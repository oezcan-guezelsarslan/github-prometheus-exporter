services:
  grafana:
    environment:
      TZ: "Europe/Berlin"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    container_name: grafana
    image: grafana/grafana
    restart: unless-stopped
    links:
      - prometheus
    volumes:
      - type: volume
        source: grafana-data
        target: /var/lib/grafana
      - type: bind
        source: ./grafana/provisioning/dashboards
        target: /etc/grafana/provisioning/dashboards
      - type: bind
        source: ./grafana/dashboards
        target: /var/lib/grafana/dashboards
      - type: bind
        source: ./grafana/provisioning/datasources
        target: /etc/grafana/provisioning/datasources
    ports:
      - "0.0.0.0:3000:3000"

  prometheus:
    container_name: prometheus
    image: prom/prometheus
    restart: unless-stopped
    extra_hosts:
      - "ba.local.de:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - type: volume
        source: prometheus-data
        target: /prometheus
      - type: bind
        source: ./prometheus/prometheus.yml
        target: /etc/prometheus/prometheus.yml
    ports:
      - "0.0.0.0:9090:9090"

  github-prometheus-exporter:
    container_name: github-prometheus-exporter
    image: ghcr.io/oezcan-guezelsarslan/github-prometheus-exporter:main
    platform: linux/amd64
    restart: unless-stopped
    environment:
      PROMETHEUS_EXPORTER_GITHUB_API_AUTHENTICATION_TOKEN: ${GITHUB_TOKEN}
    ports:
      - "0.0.0.0:8080:8080"

volumes:
  prometheus-data:
    name: prometheus-data
  grafana-data:
    name: grafana-data