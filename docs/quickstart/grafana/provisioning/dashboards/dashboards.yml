apiVersion: 1

providers:
  - name: 'Default Dashboards'
    orgId: 1
    folder: ''  # Leave empty for General folder, or specify a folder name
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10 # Scans the folder for changes every 10s
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true